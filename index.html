<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Campaign Tool</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 16px;
    background: #f5f7fb;
}

h2 { text-align: center; color: #1a365d; }

label { font-weight: bold; display: block; margin-top: 12px; }

input, select, textarea, button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    cursor: pointer;
    font-weight: bold;
}

.btn-generate { background: #2b6cb0; color: white; border: none; }
.btn-web { background: #2c5282; color: white; border: none; margin-top: 10px; }
.btn-mobile { background: #38a169; color: white; border: none; margin-top: 10px; }
.btn-copy { background: #718096; color: white; border: none; margin-top: 10px; }

textarea {
    min-height: 200px;
}
</style>
</head>

<body>

<h2>Email Campaign Tool</h2>

<label>Your Name (optional)</label>
<input id="username" placeholder="Enter your name">

<label>Choose Email Version</label>
<select id="version">
    <option value="1">Version 1</option>
    <option value="2">Version 2</option>
    <option value="3">Version 3</option>
    <option value="4">Version 4</option>
    <option value="5">Version 5</option>
</select>

<button class="btn-generate" onclick="generateEmail()">Generate Email</button>

<label>Subject</label>
<input id="subject" readonly>

<label>Body</label>
<textarea id="body" readonly></textarea>

<button class="btn-web" onclick="openMail('web')">Open Email (Web / Outlook)</button>
<button class="btn-mobile" onclick="openMail('mobile')">Open Email (Mobile / Gmail App)</button>
<button class="btn-copy" onclick="copyAll()">Copy Email</button>

<script>
/* ✔️ RECIPIENTS (edit anytime) */
const TO_EMAIL = "admin@erasmusmc.nl";
const CC_EMAIL = "nexus@nexus-instituut.nl";

/* ✔️ SIMPLE EMAIL VERSIONS */
const emails = {
    1: {
        subject: "Concern regarding upcoming event",
        body: "Dear Erasmus MC,\n\nMy name is [NAME]. I would like to express concern regarding the upcoming event.\n\nKind regards,\n[NAME]"
    },
    2: {
        subject: "Request for review of invited speaker",
        body: "Dear Erasmus MC,\n\nMy name is [NAME]. I respectfully request a review of the invited speaker.\n\nKind regards,\n[NAME]"
    },
    3: {
        subject: "Formal objection to event invitation",
        body: "Dear Erasmus MC,\n\nMy name is [NAME]. I formally object to the upcoming event invitation.\n\nKind regards,\n[NAME]"
    },
    4: {
        subject: "Institutional concern regarding event",
        body: "Dear Erasmus MC,\n\nMy name is [NAME]. I am concerned about the institutional implications of this event.\n\nKind regards,\n[NAME]"
    },
    5: {
        subject: "Urgent request for reconsideration",
        body: "Dear Erasmus MC leadership,\n\nMy name is [NAME]. I urge you to reconsider this event invitation.\n\nKind regards,\n[NAME]"
    }
};

function generateEmail() {
    const name = document.getElementById("username").value || "Concerned participant";
    const v = document.getElementById("version").value;

    let subject = emails[v].subject;
    let body = emails[v].body.replace(/\[NAME\]/g, name);

    document.getElementById("subject").value = subject;
    document.getElementById("body").value = body;
}

function openMail(mode) {
    const subject = document.getElementById("subject").value;
    const body = document.getElementById("body").value;

    if (!subject) {
        alert("Please generate email first!");
        return;
    }

    const name = document.getElementById("username").value || "Concerned participant";
    const finalBody = body.replace(/\[NAME\]/g, name);

    if (mode === "web") {
        /* ✔️ Desktop / Outlook-style */
        const url =
`mailto:${encodeURIComponent(TO_EMAIL)}?cc=${encodeURIComponent(CC_EMAIL)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(finalBody)}`;

        window.location.href = url;
    }

    if (mode === "mobile") {
        /* ✔️ Mobile Gmail / Mail app trigger */
        const url =
`mailto:${TO_EMAIL}?cc=${CC_EMAIL}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(finalBody)}`;

        window.location.href = url;
    }
}

function copyAll() {
    const subject = document.getElementById("subject").value;
    const body = document.getElementById("body").value;

    if (!subject) return alert("Generate email first!");

    navigator.clipboard.writeText(
`To: ${TO_EMAIL}
CC: ${CC_EMAIL}
Subject: ${subject}

${body}`
    );

    alert("Copied to clipboard!");
}
</script>

</body>
</html>
