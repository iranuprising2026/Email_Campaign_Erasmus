<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Campaign Tool</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 16px;
    background: #f5f7fb;
}

h2 { text-align: center; color: #1a365d; }

label { font-weight: bold; display: block; margin-top: 12px; }

input, select, textarea, button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    cursor: pointer;
    font-weight: bold;
}

.btn-generate { background: #2b6cb0; color: white; border: none; }
.btn-web { background: #2c5282; color: white; border: none; margin-top: 10px; }
.btn-mobile { background: #38a169; color: white; border: none; margin-top: 10px; }
.btn-copy { background: #718096; color: white; border: none; margin-top: 10px; }

textarea {
    min-height: 200px;
}
</style>
</head>

<body>

<h2>Erasmus University Email Campaign</h2>

<label>Your Name (optional)</label>
<input id="username" placeholder="Enter your name">

<label>City (optional)</label>
<input id="city" placeholder="Enter your city">

<label>Choose Email Version</label>
<select id="version">
    <option value="1">Version 1</option>
    <option value="2">Version 2</option>
    <option value="3">Version 3</option>
    <option value="4">Version 4</option>
    <option value="5">Version 5</option>
</select>

<button class="btn-generate" onclick="generateEmail()">Generate Email</button>

<label>Subject</label>
<input id="subject" readonly>

<label>Body</label>
<textarea id="body" readonly></textarea>

<button class="btn-web" onclick="openMail('web')">Open Email (Web / Outlook)</button>
<button class="btn-mobile" onclick="openMail('mobile')">Open Email (Mobile / Gmail App)</button>
<button class="btn-copy" onclick="copyAll()">Copy Email</button>

<script>

/* ✔️ RECIPIENTS */
const TO_EMAIL = "press@eur.nl, university.council@eur.nl, babette.boot@eur.nl, eline.vanmunster@eur.nl";
const CC_EMAIL = "ham@nexus-instituut.nl, info@nexus-instituut.nl";

/* ✔️ EMAIL TEMPLATES */
const emails = {
    1: {
        subject: "Objection to the invitation of Robert Malley",
        body: "Dear Erasmus University administration,\n\nWe formally object to the invitation of Mr. Robert Malley.\n\nMy name is [NAME].\n[CITY]\n\nSincerely,\n[NAME]"
    },
    2: {
        subject: "Serious concerns regarding invited speaker",
        body: "Dear Erasmus University,\n\nWe express serious concern about the invited speaker.\n\nMy name is [NAME].\n[CITY]\n\nSincerely,\n[NAME]"
    },
    3: {
        subject: "Formal objection to event invitation",
        body: "Dear Erasmus University,\n\nWe formally object to this event invitation.\n\nMy name is [NAME].\n[CITY]\n\nSincerely,\n[NAME]"
    },
    4: {
        subject: "Institutional concern regarding event",
        body: "Dear Erasmus University,\n\nWe are concerned about this institutional decision.\n\nMy name is [NAME].\n[CITY]\n\nSincerely,\n[NAME]"
    },
    5: {
        subject: "Urgent request for reconsideration",
        body: "Dear Erasmus University leadership,\n\nWe urge reconsideration of this invitation.\n\nMy name is [NAME].\n[CITY]\n\nSincerely,\n[NAME]"
    }
};

function generateEmail() {
    const name = document.getElementById("username").value || "Concerned participant";
    const city = document.getElementById("city").value.trim();
    const v = document.getElementById("version").value;

    let subject = emails[v].subject;
    let body = emails[v].body.replace(/\[NAME\]/g, name);

    // ✔️ handle city (only show if filled)
    if (city) {
        body = body.replace(/\[CITY\]/g, city);
    } else {
        body = body.replace(/\[CITY\]/g, "");
    }

    document.getElementById("subject").value = subject;
    document.getElementById("body").value = body;
}

function openMail(mode) {
    const subject = document.getElementById("subject").value;
    let body = document.getElementById("body").value;

    if (!subject) {
        alert("Please generate email first!");
        return;
    }

    const name = document.getElementById("username").value || "Concerned participant";
    const city = document.getElementById("city").value.trim();

    body = body.replace(/\[NAME\]/g, name);
    body = body.replace(/\[CITY\]/g, city ? city : "");

    if (mode === "web") {
        const url =
`mailto:${encodeURIComponent(TO_EMAIL)}?cc=${encodeURIComponent(CC_EMAIL)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

        window.location.href = url;
    }

    if (mode === "mobile") {
        const url =
`mailto:${TO_EMAIL}?cc=${CC_EMAIL}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

        window.location.href = url;
    }
}

function copyAll() {
    const subject = document.getElementById("subject").value;
    const body = document.getElementById("body").value;

    if (!subject) return alert("Generate email first!");

    navigator.clipboard.writeText(
`To: ${TO_EMAIL}
CC: ${CC_EMAIL}
Subject: ${subject}

${body}`
    );

    alert("Copied to clipboard!");
}

</script>

</body>
</html>
